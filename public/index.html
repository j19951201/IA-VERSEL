      const cameraModal = document.getElementById("cameraModal");

      const cameraCaptureBtn = document.getElementById("cameraCaptureBtn");
      const cameraModalClose = document.getElementById("cameraModalClose");

      let cameraStream = null;
      let cameraTargetPreviewId = null;

      function openCameraModal(targetPreviewId) {
        cameraTargetPreviewId = targetPreviewId;
        if (cameraModal) {
          cameraModal.setAttribute("aria-hidden", "false");
          cameraModal.classList.add("active");
        }
        if (cameraHint) cameraHint.textContent = "Abriendo cámara...";
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
          .then((stream) => {
            cameraStream = stream;
            if (cameraVideo) {
              cameraVideo.srcObject = stream;
              cameraVideo.play();
            }
            if (cameraHint) cameraHint.textContent = "Encuadra tu foto y pulsa Capturar.";
          })
          .catch((err) => {
            if (cameraHint) cameraHint.textContent = "No se pudo acceder a la cámara: " + (err.message || err.name || err);
          });
      }

      function closeCameraModal() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((t) => t.stop());
          cameraStream = null;
        }
        if (cameraVideo)
          cameraModal.setAttribute("aria-hidden", "true");
          cameraModal.classList.remove("active");
        }
        cameraTargetPreviewId = null;
      }

      if (cameraCaptureBtn) {
        cameraCaptureBtn.addEventListener("click", () => {
          if (!cameraVideo || !cameraCanvas) return;
          const w = cameraVideo.videoWidth || 640;
          const h = cameraVideo.videoHeight || 480;
          cameraCanvas.width = w;
          cameraCanvas.height = h;
          const ctx = cameraCanvas.getContext("2d");
          ctx.drawImage(cameraVideo, 0, 0, w, h);
          const dataUrl = cameraCanvas.toDataURL("image/jpeg", 0.85);
          const targetPreviewId = cameraTargetPreviewId;
          closeCameraModal();
          if (targetPreviewId) {
            const preview = document.getElementById(targetPreviewId);
            if (preview) {
              applyPhotoPreview(preview, dataUrl);
            }
          }
        });
      }

      if (cameraModalClose) cameraModalClose.addEventListener("click", closeCameraModal);

      function handlePhotoSelect(file, previewId) {
        if (!file || !file.type.startsWith("image/")) {
          setFeedback("Por favor selecciona una imagen valida.", "error");
          return;
        }
        if (file.size > 2 * 1024 * 1024) {
          setFeedback("La imagen no debe superar 2MB.", "error");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          const preview = document.getElementById(previewId);
          if (preview) {
            applyPhotoPreview(preview, dataUrl);
          }
        };
        reader.readAsDataURL(file);
      }

          const parsed = JSON.parse(raw);
          return {
            compactSidebar: !!parsed.compactSidebar,
            oneOpenSection: parsed.oneOpenSection !== false,
            quickSendToChat: parsed.quickSendToChat !== false
          };
        } catch (err) {
          return defaults;
        }
      }

      function saveSidebarConfig() {
        try {
          localStorage.setItem(SIDEBAR_CONFIG_KEY, JSON.stringify(sidebarConfig));
        } catch (err) {
          // Ignorar errores de storage para mantener UX.
        }
      }

      const SIDEBAR_TASKS_KEY = "iaSidebarTasks";
      const TASK_NOTIFY_EMAIL_KEY = "iaTaskNotifyEmail";

      function normalizeNotificationEmail(value) {
        return String(value || "").trim().toLowerCase();
      }

      function isGmailAddress(value) {
        return /@gmail\.com$/i.test(normalizeNotificationEmail(value));
      }

      function setTaskNotifyStatus(message, tone) {
        if (!taskNotifyStatus) return;
        taskNotifyStatus.textContent = String(message || "").trim() || "Se enviaran notificaciones solo a correos @gmail.com.";
        taskNotifyStatus.style.color = tone === "error"
          ? "#f7b8c7"
          : tone === "ok"
            ? "#9ef5d4"
            : "";
      }

      function loadTaskNotifyEmail() {
        try {
          const stored = normalizeNotificationEmail(localStorage.getItem(TASK_NOTIFY_EMAIL_KEY) || "");
          if (stored) return stored;
        } catch (_err) {
          // Silencio intencional.
        }

        const currentUser = getCurrentUser();
        const userEmail = normalizeNotificationEmail(currentUser && currentUser.email ? currentUser.email : "");
        return isGmailAddress(userEmail) ? userEmail : "";
      }

      function saveTaskNotifyEmail(value) {
        const normalized = normalizeNotificationEmail(value);
        try {
          if (!normalized) {
            localStorage.removeItem(TASK_NOTIFY_EMAIL_KEY);
            return;
          }
          localStorage.setItem(TASK_NOTIFY_EMAIL_KEY, normalized);
        } catch (_err) {
          // Silencio intencional.
        }
      }

      function loadSidebarTasks() {
        try {
          const raw = localStorage.getItem(SIDEBAR_TASKS_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (err) {
          return [];
        }
      }

      function saveSidebarTasks() {
        try {
          localStorage.setItem(SIDEBAR_TASKS_KEY, JSON.stringify(sidebarTasks));
        } catch (err) {
          // Ignorar para no interrumpir el flujo.
        }
        refreshSidebarReports();
      }

      function summarizeSavedActivitiesForMail() {
        return {
          tasks: sidebarTasks.slice(0, 80).map((task) => ({
            text: String(task && task.text ? task.text : "Tarea sin descripción"),
            priority: String(task && task.priority ? task.priority : "normal"),
            completed: !!(task && task.completed),
            createdAt: String(task && task.createdAt ? task.createdAt : "")
          })),
          events: calendarEvents.slice(0, 80).map((eventItem) => ({
            title: String(eventItem && eventItem.title ? eventItem.title : "Evento"),
            date: String(eventItem && eventItem.date ? eventItem.date : ""),
            time: String(eventItem && eventItem.time ? eventItem.time : ""),
            owner: String(eventItem && eventItem.owner ? eventItem.owner : ""),
            note: String(eventItem && eventItem.note ? eventItem.note : "")
          }))
        };
      }

      async function sendActivitiesNotificationByEmail() {
        const emailFromInput = normalizeNotificationEmail(taskNotifyEmail && taskNotifyEmail.value ? taskNotifyEmail.value : "");
        const fallbackEmail = loadTaskNotifyEmail();
        const destinationEmail = emailFromInput || fallbackEmail;

        if (!destinationEmail) {
          setTaskNotifyStatus("Escribe un correo Gmail para enviar la notificacion.", "error");
          if (taskNotifyEmail) taskNotifyEmail.focus();
          return;
        }

        if (!isGmailAddress(destinationEmail)) {
          setTaskNotifyStatus("Solo se permiten correos @gmail.com para esta notificacion.", "error");
          if (taskNotifyEmail) taskNotifyEmail.focus();
          return;
        }

        if (sendTaskNotificationsBtn) {
          sendTaskNotificationsBtn.disabled = true;
          sendTaskNotificationsBtn.textContent = "Enviando...";
        }

        setTaskNotifyStatus("Preparando notificacion...", "");

        try {
          const payload = {
            to: destinationEmail,
            source: "tareas_del_dia",
            generatedAt: new Date().toISOString(),
            activities: summarizeSavedActivitiesForMail()
          };

          const response = await fetch("/api/auth/users-report", {
            method: "POST",
            credentials: "include",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const result = await response.json().catch(() => ({}));
          if (!response.ok) {
            const message = result && result.error ? result.error : "No se pudo enviar la notificacion.";
            const detail = result && result.detail ? ` (${result.detail})` : "";
            throw new Error(`${message}${detail}`);
          }

          saveTaskNotifyEmail(destinationEmail);
          if (taskNotifyEmail) taskNotifyEmail.value = destinationEmail;
          setTaskNotifyStatus(result.message || `Notificacion enviada a ${destinationEmail}.`, "ok");
        } catch (error) {
          setTaskNotifyStatus(error && error.message ? error.message : "No se pudo enviar la notificacion.", "error");
        } finally {
          if (sendTaskNotificationsBtn) {
            sendTaskNotificationsBtn.disabled = false;
            sendTaskNotificationsBtn.textContent = "Enviar notificacion";
          }
        }
      }

      function applySidebarConfig() {
        const sidebar = document.querySelector(".sidebar");
        if (sidebar) {
          sidebar.classList.toggle("is-compact", !!sidebarConfig.compactSidebar);
        }
      }

      function renderDocumentsList() {
        if (!docsList) return;

        const query = normalizeForSearch(docsSearchInput?.value || "");
        const typeFilter = String(docsTypeFilter?.value || "todos").toLowerCase();
        const filtered = documentLibrary.filter((item) => {
          const byType = typeFilter === "todos" || item.type === typeFilter;
          const haystack = normalizeForSearch(`${item.title} ${item.type}`);
          const byQuery = !query || haystack.includes(query);
          return byType && byQuery;
        });

        if (docsCountLabel) {
          docsCountLabel.textContent = `${filtered.length} documento${filtered.length === 1 ? "" : "s"}`;
        }

        if (!filtered.length) {
          docsList.innerHTML = '<p class="sidebar-empty">No hay documentos con ese filtro.</p>';
          return;
        }

        docsList.innerHTML = filtered
          .map((item) => {
            const typeLabel = item.type.charAt(0).toUpperCase() + item.type.slice(1);
            return `
              <div class="sidebar-item">
                <strong>${escapeHtml(item.title)}</strong>
                <small>${escapeHtml(typeLabel)} · Actualizado ${escapeHtml(item.updatedAt)}</small>
                <div class="sidebar-item-meta">
                  <span class="sidebar-badge">Base local</span>
                  <button type="button" data-doc-analyze="${escapeHtml(item.title)}">Analizar</button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function renderTasksList() {
        if (!tasksList) return;

        if (!sidebarTasks.length) {
          tasksList.innerHTML = '<p class="sidebar-empty">No hay tareas. ¡Buen trabajo!</p>';
          return;
        }

        tasksList.innerHTML = sidebarTasks
          .map((task) => {
            const priorityClass = `priority-${task.priority || "normal"}`;
            const checkedClass = task.completed ? "completed" : "";
            return `
              <div class="sidebar-item task-item ${checkedClass}">
                <div class="task-checkbox-row">
                  <input type="checkbox" class="task-checkbox" data-task-id="${escapeHtml(task.id)}" ${task.completed ? "checked" : ""} />
                  <strong class="${checkedClass}">${escapeHtml(task.text || "Tarea sin descripción")}</strong>
                </div>
                <small class="${priorityClass}">${escapeHtml(task.priority || "normal").charAt(0).toUpperCase() + (task.priority || "normal").slice(1)}</small>
                <div class="sidebar-item-meta">
                  <span class="task-time">${escapeHtml(formatDate(task.createdAt || new Date().toISOString()))}</span>
                  <button type="button" data-task-remove="${escapeHtml(task.id)}" class="task-delete-btn">🗑️</button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function refreshSidebarReports() {
        if (reportConversationsCount) {
          reportConversationsCount.textContent = String(conversations.length);
        }
        if (reportEventsCount) {
          reportEventsCount.textContent = String(calendarEvents.length);
        }
        if (reportClientsCount) {
          const tasksCompleted = sidebarTasks.filter((t) => t.completed).length;
          reportClientsCount.textContent = `${tasksCompleted}/${sidebarTasks.length}`;
        }
        if (reportDocsCount) {
          reportDocsCount.textContent = String(documentLibrary.length);
        }
        if (reportsUpdatedAt) {
          reportsUpdatedAt.textContent = `Actualizado: ${new Date().toLocaleTimeString("es-DO", {
            hour: "2-digit",
            minute: "2-digit"
          })}`;
        }
      }

      async function sendSidebarQueryToChat(text) {
        const query = String(text || "").trim();
        if (!query) return;

        openModal();
        if (sidebarConfig.quickSendToChat) {
          await sendMessage({ externalText: query });
        } else if (chatInput) {
          chatInput.value = query;
          chatInput.focus();
        }
      }

      function runSidebarSectionBehavior(sectionId) {
        const id = String(sectionId || "").trim();
        if (!id) return;

        if (id === "chatHistoryDropdown") {
          renderSavedConversations();
          return;
        }

        if (id === "consultasDropdown") {
          if (consultaQuickInput) consultaQuickInput.focus();
          return;
        }

        if (id === "asistenteDropdown") {
          refreshSidebarReports();
          return;
        }

        if (id === "documentosDropdown") {
          renderDocumentsList();
          if (docsSearchInput) docsSearchInput.focus();
          return;
        }

        if (id === "calendarioDropdown") {
          renderCalendarHeader();
          renderCalendarMonthGrid();
          renderCalendarEvents();
          return;
        }

        if (id === "tareasDropdown") {
          renderTasksList();
          if (taskNotifyEmail) {
            taskNotifyEmail.value = loadTaskNotifyEmail();
          }
          setTaskNotifyStatus("Se enviaran notificaciones solo a correos @gmail.com.", "");
          if (taskInput) taskInput.focus();
          return;
        }

        if (id === "reportesDropdown") {
          refreshSidebarReports();
          return;
        }

        if (id === "configDropdown") {
          applySidebarConfig();
          if (cfgCompactSidebar) cfgCompactSidebar.checked = !!sidebarConfig.compactSidebar;
          if (cfgSingleOpen) cfgSingleOpen.checked = !!sidebarConfig.oneOpenSection;
          if (cfgQuickSend) cfgQuickSend.checked = !!sidebarConfig.quickSendToChat;
        }
      }

      function initSidebarProgrammedSections() {
        applySidebarConfig();

        if (cfgCompactSidebar) {
          cfgCompactSidebar.checked = !!sidebarConfig.compactSidebar;
          cfgCompactSidebar.addEventListener("change", () => {
            sidebarConfig.compactSidebar = !!cfgCompactSidebar.checked;
            saveSidebarConfig();
            applySidebarConfig();
          });
        }

        if (cfgSingleOpen) {
          cfgSingleOpen.checked = !!sidebarConfig.oneOpenSection;
          cfgSingleOpen.addEventListener("change", () => {
            sidebarConfig.oneOpenSection = !!cfgSingleOpen.checked;
            saveSidebarConfig();
          });
        }

        if (cfgQuickSend) {
          cfgQuickSend.checked = !!sidebarConfig.quickSendToChat;
          cfgQuickSend.addEventListener("change", () => {
            sidebarConfig.quickSendToChat = !!cfgQuickSend.checked;
            saveSidebarConfig();
          });
        }

        if (resetSidebarConfigBtn) {
          resetSidebarConfigBtn.addEventListener("click", () => {
            sidebarConfig = getSidebarDefaultConfig();
            saveSidebarConfig();
            applySidebarConfig();
            if (cfgCompactSidebar) cfgCompactSidebar.checked = !!sidebarConfig.compactSidebar;
            if (cfgSingleOpen) cfgSingleOpen.checked = !!sidebarConfig.oneOpenSection;
            if (cfgQuickSend) cfgQuickSend.checked = !!sidebarConfig.quickSendToChat;
          });
        }

        if (consultaQuickSendBtn) {
          consultaQuickSendBtn.addEventListener("click", async () => {
            const text = String(consultaQuickInput?.value || "").trim();
            if (!text) return;
            await sendSidebarQueryToChat(text);
            if (consultaQuickInput) consultaQuickInput.value = "";
          });
        }

        if (consultaQuickInput) {
          consultaQuickInput.addEventListener("keydown", async (event) => {
            if (event.key !== "Enter") return;
            event.preventDefault();
            const text = String(consultaQuickInput.value || "").trim();
            if (!text) return;
            await sendSidebarQueryToChat(text);
            consultaQuickInput.value = "";
          });
        }

        if (consultaQuickTemplates) {
          consultaQuickTemplates.addEventListener("click", (event) => {
            const btn = event.target.closest("[data-template]");
            if (!btn) return;
            const template = String(btn.getAttribute("data-template") || "").trim();
            if (!template || !consultaQuickInput) return;
            consultaQuickInput.value = template;
            consultaQuickInput.focus();
          });
        }

        if (openAssistantChatBtn) {
          openAssistantChatBtn.addEventListener("click", () => {
            openModal();
            if (chatInput) chatInput.focus();
          });
        }

        if (startAssistantVoiceBtn) {
          startAssistantVoiceBtn.addEventListener("click", () => {
            openVoiceModal();
          });
        }

        if (openSystemStatusBtn) {
          openSystemStatusBtn.addEventListener("click", () => {
            openStatusModal();
          });
        }

        if (docsSearchInput) {
          docsSearchInput.addEventListener("input", renderDocumentsList);
        }

        if (docsTypeFilter) {
          docsTypeFilter.addEventListener("change", renderDocumentsList);
        }

        if (docsList) {
          docsList.addEventListener("click", async (event) => {
            const btn = event.target.closest("[data-doc-analyze]");
            if (!btn) return;
            const title = String(btn.getAttribute("data-doc-analyze") || "").trim();
            if (!title) return;
            await sendSidebarQueryToChat(`Analiza este documento: ${title}`);
          });
        }

        if (addTaskBtn) {
          addTaskBtn.addEventListener("click", () => {
            const text = String(taskInput?.value || "").trim();
            const priority = String(taskPriority?.value || "normal").trim();

            if (!text) return;

            sidebarTasks.unshift({
              id: `task_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
              text,
              priority,
              completed: false,
              createdAt: new Date().toISOString()
            });

            sidebarTasks = sidebarTasks.slice(0, 80);
            saveSidebarTasks();
            renderTasksList();

            if (taskInput) taskInput.value = "";
            if (taskPriority) taskPriority.value = "normal";
          });
        }

        if (taskInput) {
          taskInput.addEventListener("keydown", (event) => {
            if (event.key !== "Enter") return;
            event.preventDefault();
            if (addTaskBtn) addTaskBtn.click();
          });
        }

        if (tasksList) {
          tasksList.addEventListener("change", (event) => {
            const checkbox = event.target.closest(".task-checkbox");
            if (!checkbox) return;
            const id = String(checkbox.getAttribute("data-task-id") || "").trim();
            if (!id) return;

            const task = sidebarTasks.find((item) => item.id === id);
            if (task) {
              task.completed = !!checkbox.checked;
              saveSidebarTasks();
              renderTasksList();
            }
          });
        }

        if (tasksList) {
          tasksList.addEventListener("click", (event) => {
            const btn = event.target.closest("[data-task-remove]");
            if (!btn) return;
            const id = String(btn.getAttribute("data-task-remove") || "").trim();
            if (!id) return;

            sidebarTasks = sidebarTasks.filter((item) => item.id !== id);
            saveSidebarTasks();
            renderTasksList();
          });
        }

        if (taskNotifyEmail) {
          taskNotifyEmail.value = loadTaskNotifyEmail();
          taskNotifyEmail.addEventListener("blur", () => {
            saveTaskNotifyEmail(taskNotifyEmail.value);
          });
        }

        if (sendTaskNotificationsBtn) {
          sendTaskNotificationsBtn.addEventListener("click", () => {
            sendActivitiesNotificationByEmail();
          });
        }

        if (refreshReportsBtn) {
          refreshReportsBtn.addEventListener("click", refreshSidebarReports);
        }

        renderDocumentsList();
        renderTasksList();
        refreshSidebarReports();
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Sin fecha";
        return date.toLocaleString("es-DO", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatIaResponseTime(ms) {
        const num = Number(ms);
        if (!Number.isFinite(num) || num <= 0) return "";
        if (num < 1000) return `${Math.round(num)} ms`;
        return `${(num / 1000).toFixed(1)} s`;
      }

      function formatCalendarEventDate(eventItem) {
        const datePart = eventItem.date || "";
        const timePart = eventItem.time || "";
        if (!datePart) return "Sin fecha";

        const value = `${datePart}T${timePart || "00:00"}:00`;
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Sin fecha";

        const dateText = date.toLocaleDateString("es-DO", {
          day: "2-digit",
          month: "2-digit",
          year: "2-digit"
        });

        if (!timePart) return dateText;
        const timeText = date.toLocaleTimeString("es-DO", {
          hour: "2-digit",
          minute: "2-digit"
        });
        return `${dateText} ${timeText}`;
      }

      function getCurrentUser() {
        try {
          const raw = localStorage.getItem("currentUser");
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (err) {
          return null;
        }
      }

      function isRegisteredUser(user) {
        if (!user || typeof user !== "object") return false;
        if (user.isGuest === true) return false;
        const role = String(user.role || user.userType || user.profileType || "").toLowerCase();
        return role !== "guest" && role !== "invitado";
      }

      function renderProfilePrivateEventsList() {
        if (!profilePrivateEventsList) return;

        const user = getCurrentUser();
        if (!isRegisteredUser(user)) {
          profilePrivateEventsList.innerHTML = '<p class="history-empty">EVENTOS GUARDADOS SOLO DISPONIBLES PARA USUARIOS REGISTRADOS EN ESTA APP.</p>';
          return;
        }

        if (!calendarEvents.length) {
          profilePrivateEventsList.innerHTML = '<p class="history-empty">Aun no tienes eventos guardados.</p>';
          return;
        }

        const ordered = [...calendarEvents].sort((a, b) => {
          const aDate = new Date(`${a.date || "1970-01-01"}T${a.time || "00:00"}:00`).getTime();
          const bDate = new Date(`${b.date || "1970-01-01"}T${b.time || "00:00"}:00`).getTime();
          return aDate - bDate;
        });

        profilePrivateEventsList.innerHTML = "";
        ordered.forEach((eventItem) => {
          const item = document.createElement("div");
          item.className = "calendar-event-item";
          item.innerHTML = `
            <div class="calendar-event-head">
              <strong>${escapeHtml(eventItem.title || "Evento")}</strong>
              <button type="button" class="calendar-delete-btn" data-private-event-id="${escapeHtml(eventItem.id)}" aria-label="Eliminar evento">✕</button>
            </div>
            <p class="calendar-event-meta">${escapeHtml(formatCalendarEventDate(eventItem))} · ${escapeHtml(eventItem.owner || "Cliente")}</p>
            ${eventItem.note ? `<p class="calendar-event-note">${escapeHtml(eventItem.note)}</p>` : ""}
          `;
          profilePrivateEventsList.appendChild(item);
        });
      }

      function openProfilePrivateModal() {
        if (!profilePrivateModal) return;
        renderProfilePrivateEventsList();
        profilePrivateModal.classList.add("active");
        profilePrivateModal.setAttribute("aria-hidden", "false");
      }

      function closeProfilePrivateModal() {
        if (!profilePrivateModal) return;
        profilePrivateModal.classList.remove("active");
        profilePrivateModal.setAttribute("aria-hidden", "true");
      }

      function formatLatency(latencyMs) {
        const value = Number(latencyMs);
        if (!Number.isFinite(value) || value <= 0) return "--";
        if (value < 1000) return `${Math.round(value)} ms`;
        return `${(value / 1000).toFixed(1)} s`;
      }

      function setStatusLoading(message) {
        if (statusGlobalIndicator) {
          statusGlobalIndicator.textContent = message || "Actualizando...";
          statusGlobalIndicator.className = "status-global pending";
        }
      }

      function renderStatusCards(services) {
        if (!statusGrid) return;

        if (!Array.isArray(services) || !services.length) {
          statusGrid.innerHTML = `
            <div class="status-card">
              <div>
                <strong>Sin datos</strong>
                <p>No se recibieron servicios para mostrar.</p>
              </div>
              <span class="status-pill pending">PENDIENTE</span>
            </div>
          `;
          return;
        }

        statusGrid.innerHTML = services.map((service) => {
          const isOk = !!(service && service.connected);
          const pillClass = isOk ? "ok" : "fail";
          const pillText = isOk ? "CONECTADO" : "DESCONECTADO";
          const name = escapeHtml(String((service && service.name) || "Servicio"));
          const detail = escapeHtml(String((service && service.detail) || "Sin detalle"));
          const latency = formatLatency(service && service.latencyMs);

          return `
            <div class="status-card">
              <div>
                <strong>${name}</strong>
                <p>${detail}</p>
                <small>Latencia: ${escapeHtml(latency)}</small>
              </div>
              <span class="status-pill ${pillClass}">${pillText}</span>
            </div>
          `;
        }).join("");
      }

      async function refreshRealtimeStatus() {
        if (statusFetchInProgress) return;
        statusFetchInProgress = true;

        try {
          setStatusLoading("Consultando estado de aplicaciones y API keys...");
          const response = await fetch(`/api/system-status?ts=${Date.now()}`, {
            method: "GET",
            cache: "no-store"
          });

          const payload = await response.json().catch(() => ({}));
          const services = Array.isArray(payload.services) ? payload.services : [];
          renderStatusCards(services);

          const globalOk = !!payload.globalConnected;
          if (statusGlobalIndicator) {
            statusGlobalIndicator.className = `status-global ${globalOk ? "ok" : "fail"}`;
            statusGlobalIndicator.textContent = globalOk
              ? "GLOBAL: Todo conectado"
              : "GLOBAL: Hay servicios desconectados";
          }

          if (statusLastUpdated) {
            const date = payload.generatedAt ? new Date(payload.generatedAt) : new Date();
            statusLastUpdated.textContent = `Ultima actualizacion: ${date.toLocaleTimeString("es-DO")}`;
          }
        } catch (error) {
          renderStatusCards([]);
          if (statusGlobalIndicator) {
            statusGlobalIndicator.className = "status-global fail";
            statusGlobalIndicator.textContent = "GLOBAL: Error al consultar estado";
          }
          if (statusLastUpdated) {
            statusLastUpdated.textContent = `Ultima actualizacion: ${new Date().toLocaleTimeString("es-DO")}`;
          }
        } finally {
          statusFetchInProgress = false;
        }
      }

      function startRealtimeStatusPolling() {
        stopRealtimeStatusPolling();
        refreshRealtimeStatus();
        statusTimer = window.setInterval(refreshRealtimeStatus, 7000);
      }

      function stopRealtimeStatusPolling() {
        if (!statusTimer) return;
        window.clearInterval(statusTimer);
        statusTimer = null;
      }

      function openStatusModal() {
        if (!statusModal) return;
        statusModal.classList.add("active");
        statusModal.setAttribute("aria-hidden", "false");
        stage.classList.add("modal-open");
        startRealtimeStatusPolling();
      }

      function closeStatusModal() {
        if (!statusModal) return;
        statusModal.classList.remove("active");
        statusModal.setAttribute("aria-hidden", "true");
        stopRealtimeStatusPolling();
        if (!modal.classList.contains("active")) {
          stage.classList.remove("modal-open");
        }
      }

      function toIsoDate(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function parseIsoDate(value) {
        const source = String(value || "").trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(source)) return null;
        const parsed = new Date(`${source}T00:00:00`);
        if (Number.isNaN(parsed.getTime())) return null;
        return parsed;
      }

      function isSameDay(a, b) {
        return (
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate()
        );
      }

      function renderCalendarHeader() {
        if (calendarNowLabel) {
          calendarNowLabel.textContent = calendarSelectedDate.toLocaleDateString("es-DO", {
            weekday: "long",
            month: "long",
            day: "numeric"
          });
        }

        if (calendarMonthLabel) {
          calendarMonthLabel.textContent = calendarViewDate.toLocaleDateString("es-DO", {
            month: "long",
            year: "numeric"
          });
        }
      }

      function renderCalendarMonthGrid() {
        if (!calendarMonthGrid) return;

        const year = calendarViewDate.getFullYear();
        const month = calendarViewDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const startOffset = firstDay.getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        const today = new Date();

        calendarMonthGrid.innerHTML = "";

        for (let index = 0; index < 42; index += 1) {
          const cell = document.createElement("button");
          cell.type = "button";
          cell.className = "calendar-day";

          let dayNumber = index - startOffset + 1;
          let cellDate;

          if (dayNumber <= 0) {
            cellDate = new Date(year, month - 1, daysInPrevMonth + dayNumber);
            cell.classList.add("is-outside");
          } else if (dayNumber > daysInMonth) {
            cellDate = new Date(year, month + 1, dayNumber - daysInMonth);
            cell.classList.add("is-outside");
          } else {
            cellDate = new Date(year, month, dayNumber);
          }

          const iso = toIsoDate(cellDate);
          cell.dataset.date = iso;
          cell.textContent = String(cellDate.getDate());
          cell.setAttribute("aria-label", cellDate.toLocaleDateString("es-DO", {
            weekday: "long",
            month: "long",
            day: "numeric"
          }));

          if (isSameDay(cellDate, today)) {
            cell.classList.add("is-today");
          }

          if (isSameDay(cellDate, calendarSelectedDate)) {
            cell.classList.add("is-selected");
          }

          calendarMonthGrid.appendChild(cell);
        }
      }

      function renderCalendarEvents() {
        if (!calendarEventsList) return;
        calendarEventsList.innerHTML = '<p class="history-empty">EVENTOS GUARDADOS SOLO DISPONIBLES PARA USUARIOS REGISTRADOS EN ESTA APP.</p>';
      }

      function addCalendarEvent() {
        const user = getCurrentUser();
        if (!isRegisteredUser(user)) {
          renderCalendarEvents();
          return;
        }

        const dateValue = String(calendarDateInput?.value || toIsoDate(calendarSelectedDate)).trim();
        const timeValue = String(calendarTimeInput?.value || "").trim();
        const titleValue = String(calendarTitleInput?.value || "").trim();
        const ownerValue = String(calendarOwnerInput?.value || "Cliente").trim() || "Cliente";
        const noteValue = String(calendarNoteInput?.value || "").trim();

        if (!dateValue || !titleValue) {
          return;
        }

        calendarEvents.unshift({
          id: `ev_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
          date: dateValue,
          time: timeValue,
          title: titleValue,
          owner: ownerValue,
          note: noteValue,
          createdAt: new Date().toISOString()
        });

        calendarEvents.sort((a, b) => {
          const aDate = new Date(`${a.date || "1970-01-01"}T${a.time || "00:00"}:00`).getTime();
          const bDate = new Date(`${b.date || "1970-01-01"}T${b.time || "00:00"}:00`).getTime();
          return aDate - bDate;
        });

        saveCalendarEvents();
        const parsedDate = parseIsoDate(dateValue);
        if (parsedDate) {
          calendarSelectedDate = parsedDate;
          calendarViewDate = new Date(parsedDate.getFullYear(), parsedDate.getMonth(), 1);
        }

        renderCalendarHeader();
        renderCalendarMonthGrid();
        renderCalendarEvents();
        renderProfilePrivateEventsList();
        if (calendarTitleInput) calendarTitleInput.value = "";
        if (calendarNoteInput) calendarNoteInput.value = "";
      }

      function truncate(text, max) {
        if (!text) return "Conversacion sin titulo";
        return text.length > max ? `${text.slice(0, max)}...` : text;
      }

      function normalizeForSearch(text) {
        return String(text || "")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function extractArticleNumbers(text) {
        const source = String(text || "");
        const matches = [...source.matchAll(/\bart(?:iculo)?\.?\s*(\d+[a-z0-9-]*)/gi)];
        const unique = [];

        matches.forEach((m) => {
          const val = String(m[1] || "").toUpperCase();
          if (val && !unique.includes(val)) {
            unique.push(val);
          }
        });

        return unique.slice(0, 2);
      }

      function inferCountryCode(text) {
        const t = normalizeForSearch(text);
        if (/(eeuu|estados unidos|usa|u\.s\.a|united states)/.test(t)) return "EEUU";
        if (/(republica dominicana|rep dom|\brd\b|dominicana)/.test(t)) return "RD";
        if (/(mexico|mexicano|mexicana)/.test(t)) return "MX";
        if (/(espana|espanol|espanola)/.test(t)) return "ES";
        if (/(colombia|colombiano|colombiana)/.test(t)) return "CO";
        return "";
      }

      function inferCaseTopic(text) {
        const t = normalizeForSearch(text);
        if (t.includes("despido")) return "Caso de despido";
        if (t.includes("arrendamiento")) return "Caso de arrendamiento";
        if (t.includes("divorcio")) return "Caso de divorcio";
        if (t.includes("indemnizacion")) return "Caso de indemnizacion";
        if (t.includes("laboral")) return "Caso laboral";
        if (t.includes("penal")) return "Caso penal";
        if (t.includes("civil")) return "Caso civil";
        if (t.includes("mercantil")) return "Caso mercantil";

        const cleaned = String(text || "").replace(/\s+/g, " ").trim();
        if (!cleaned) return "Caso legal";
        return `Caso: ${cleaned.split(" ").slice(0, 6).join(" ")}`;
      }

      function isLegalConversationText(text) {
        const t = normalizeForSearch(text);
        if (!t) return false;
        if (/\bart(?:iculo)?\.?\s*\d+/i.test(text)) return true;

        const legalKeywords = [
          "ley",
          "articulo",
          "jurisprudencia",
          "sentencia",
          "demanda",
          "audiencia",
          "contrato",
          "abogado",
          "tribunal",
          "codigo",
          "laboral",
          "penal",
          "civil",
          "mercantil"
        ];

        return legalKeywords.some((kw) => t.includes(kw));
      }

      function buildLegalConversationTitle(text) {
        const topic = inferCaseTopic(text);
        const articleNumbers = extractArticleNumbers(text);
        const countryCode = inferCountryCode(text);

        const parts = [topic];
        if (articleNumbers.length === 1) {
          parts.push(`Art. ${articleNumbers[0]}`);
        } else if (articleNumbers.length > 1) {
          parts.push(`Arts. ${articleNumbers.join(", ")}`);
        }

        if (countryCode) {
          parts.push(`(${countryCode})`);
        }

        return truncate(parts.join(" - "), 45);
      }

      function updateConversationTitle(activeConversation, latestText) {
        const historyText = (activeConversation.messages || []).map((m) => m.text).join(" ");
        const fullText = `${historyText} ${String(latestText || "")}`.trim();

        if (isLegalConversationText(fullText)) {
          activeConversation.title = buildLegalConversationTitle(fullText);
          return;
        }

        if (activeConversation.title === "Conversacion nueva" && latestText) {
          activeConversation.title = truncate(String(latestText), 45);
        }
      }

      function normalizeLoadedConversationTitles() {
        let hasChanges = false;

        conversations.forEach((conv) => {
          const text = (conv.messages || []).map((m) => m.text).join(" ");
          if (!text) return;
          if (!isLegalConversationText(text)) return;

          const legalTitle = buildLegalConversationTitle(text);
          if (conv.title !== legalTitle) {
            conv.title = legalTitle;
            hasChanges = true;
          }

          const inferredCategory = inferConversationCategory(conv);
          if (conv.category !== inferredCategory) {
            conv.category = inferredCategory;
            hasChanges = true;
          }
        });

        if (hasChanges) {
          saveConversations();
        }
      }

      function inferConversationCategory(conversation) {
        const title = String(conversation && conversation.title ? conversation.title : "");
        const body = Array.isArray(conversation && conversation.messages)
          ? conversation.messages.map((msg) => String(msg && msg.text ? msg.text : "")).join(" ")
          : "";

        const source = normalizeForSearch(`${title} ${body}`);

        if (/\baudiencia\b|conciliacion|comparecencia/.test(source)) return "audiencias";
        if (/\bdocumento\b|\bcontrato\b|expediente|archivo|pdf|escrito/.test(source)) return "documentos";
        if (/\bcaso\b|\bdemanda\b|\btribunal\b|\bsentencia\b|\bjurisprudencia\b|\bley\b|\barticulo\b|laboral|penal|civil|mercantil|despido|divorcio|indemnizacion|arrendamiento/.test(source)) return "casos";
        return "consultas ia";
      }

      function resolveConversationCategory(conversation) {
        const existing = toCategoryValue(conversation && conversation.category ? conversation.category : "");
        if (conversation && conversation.category && CATEGORY_VALUES.includes(existing)) {
          return existing;
        }
        return inferConversationCategory(conversation);
      }

      function renderSavedConversations() {
        if (!savedConversationsList) return;

        if (!conversations.length) {
          savedConversationsList.innerHTML = '<p class="history-empty">Aun no hay conversaciones guardadas.</p>';
          renderStatCardCounters();
          renderCategoryTabsWorkspace();
          renderRecentCasesFromConversations();
          if (casesSearchModal && casesSearchModal.classList.contains("active")) {
            renderCasesSearchModalList(casesSearchModalInput?.value || "");
          }
          return;
        }

        savedConversationsList.innerHTML = "";
        conversations.forEach((conv) => {
          const category = resolveConversationCategory(conv);
          const iaTime = formatIaResponseTime(conv.lastIaResponseMs);
          const iaSuffix = iaTime ? ` · Tiempo resp. IA: ${iaTime}` : "";
          const item = document.createElement("button");
          item.type = "button";
          item.className = "history-item";
          item.dataset.conversationId = conv.id;
          item.innerHTML = `
            <span class="history-item-title">${escapeHtml(truncate(conv.title, 38))}</span>
            <span class="history-item-meta"><strong class="history-item-category">${escapeHtml(getCategoryLabel(category))}</strong> · ${escapeHtml(formatDate(conv.updatedAt))} · ${conv.messages.length} mensajes${escapeHtml(iaSuffix)}</span>
          `;
          item.addEventListener("click", () => {
            activeConversationId = conv.id;
            openModal();
            renderActiveConversation();
          });
          savedConversationsList.appendChild(item);
        });

        renderStatCardCounters();
        renderCategoryTabsWorkspace();
        renderRecentCasesFromConversations();
        if (casesSearchModal && casesSearchModal.classList.contains("active")) {
          renderCasesSearchModalList(casesSearchModalInput?.value || "");
        }
      }

      function normalizeCaseStatusValue(value) {
        const normalized = normalizeForSearch(value || "");
        if (normalized.includes("cerr")) return "cerrado";
        if (normalized.includes("activ")) return "activo";
        return "en proceso";
      }

      function inferConversationCaseStatus(conversation) {
        if (conversation && conversation.caseStatus) {
          return normalizeCaseStatusValue(conversation.caseStatus);
        }

        const title = String(conversation && conversation.title ? conversation.title : "");
        const body = Array.isArray(conversation && conversation.messages)
          ? conversation.messages.map((msg) => String(msg && msg.text ? msg.text : "")).join(" ")
          : "";
        const source = normalizeForSearch(`${title} ${body}`);

        if (/\bcerrad|\barchivad|finalizad|resuelt|concluid/.test(source)) return "cerrado";
        if (/\bactivo|vigent|en curso/.test(source)) return "activo";
        return "en proceso";
      }

      function getRecentCaseDisplayStatus(conversation) {
        const baseStatus = inferConversationCaseStatus(conversation);
        const referenceRaw = conversation && (conversation.updatedAt || conversation.createdAt);
        const referenceDate = new Date(referenceRaw || "");

        if (Number.isNaN(referenceDate.getTime())) {
          return baseStatus;
        }

        const ageMs = Date.now() - referenceDate.getTime();
        const threeDaysMs = 3 * 24 * 60 * 60 * 1000;

        // Regla solo visual para "Casos recientes": si supera 3 dias, mostrar cerrado.
        if (ageMs > threeDaysMs) {
          return "cerrado";
        }

        return baseStatus;
      }

      function getCaseStatusClass(statusValue) {
        if (statusValue === "activo") return "success";
        if (statusValue === "cerrado") return "danger";
        return "warning";
      }

      function getCaseStatusLabel(statusValue) {
        if (statusValue === "activo") return "Activo";
        if (statusValue === "cerrado") return "Cerrado";
        return "En proceso";
      }

      function buildCaseExpCode(conversation) {
        const rawId = String(conversation && conversation.id ? conversation.id : "");
        const compact = rawId.replace(/[^a-z0-9]/gi, "").toUpperCase();
        const suffix = compact.slice(-6) || "000000";
        return `Exp. ${suffix}`;
      }

      function renderRecentCasesFromConversations() {
        if (!recentCasesList) return;

        const allCaseConversations = conversations
          .filter((conv) => resolveConversationCategory(conv) === "casos")
          .map((conv) => ({
            ...conv,
            resolvedStatus: getRecentCaseDisplayStatus(conv)
          }))
          .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

        const filtered = activeCaseStatusFilter === "todos"
          ? allCaseConversations
          : allCaseConversations.filter((conv) => conv.resolvedStatus === activeCaseStatusFilter);

        if (!filtered.length) {
          const text = allCaseConversations.length
            ? "No hay casos en este estado todavia."
            : "No hay casos guardados todavia.";
          recentCasesList.innerHTML = `<p class="history-empty">${escapeHtml(text)}</p>`;
          return;
        }

        recentCasesList.innerHTML = "";
        filtered.forEach((conv) => {
          const item = document.createElement("div");
          item.className = "case-item";

          const statusClass = getCaseStatusClass(conv.resolvedStatus);
          const statusLabel = getCaseStatusLabel(conv.resolvedStatus);

          item.innerHTML = `
            <div>
              <strong>${escapeHtml(truncate(conv.title, 42))}</strong>
              <span>${escapeHtml(buildCaseExpCode(conv))}</span>
            </div>
            <em class="tag ${statusClass}">${escapeHtml(statusLabel)}</em>
          `;

          item.addEventListener("click", () => {
            activeConversationId = conv.id;
            openModal();
            renderActiveConversation();
          });

          recentCasesList.appendChild(item);
        });
      }

      function initRecentCasesTabs() {
        if (!caseStatusTabs.length) return;

        caseStatusTabs.forEach((tabBtn) => {
          tabBtn.addEventListener("click", () => {
            const status = normalizeForSearch(tabBtn.dataset.caseStatusTab || "todos");
            activeCaseStatusFilter = status || "todos";

            caseStatusTabs.forEach((btn) => {
              btn.classList.toggle("is-active", btn === tabBtn);
            });

            renderRecentCasesFromConversations();
          });
        });
      }

      function getConversationsByCategory(categoryName) {
        const requested = toCategoryValue(categoryName);
        return conversations.filter((conv) => resolveConversationCategory(conv) === requested);
      }

      function renderStatCardCounters() {
        if (!statCards.length) return;

        const currentUser = getCurrentUser();
        const showRealCounters = isRegisteredUser(currentUser);

        const counters = {
          "casos": 0,
          "consultas ia": 0,
          "documentos": 0,
          "audiencias": 0
        };

        if (showRealCounters) {
          conversations.forEach((conv) => {
            const category = resolveConversationCategory(conv);
            if (Object.prototype.hasOwnProperty.call(counters, category)) {
              counters[category] += 1;
            }
          });
        }

        statCards.forEach((card) => {
          const category = normalizeForSearch(card.dataset.category || "");
          const value = Object.prototype.hasOwnProperty.call(counters, category) ? counters[category] : 0;
          const countNode = card.querySelector("h3");
          if (countNode) {
            countNode.textContent = String(value);
          }
        });
      }

      function setActiveCategoryTab(tabId) {
        activeCategoryTabId = tabId;
        renderCategoryTabsWorkspace();
      }

      function closeCategoryTab(tabId) {
        const nextTabs = openCategoryTabs.filter((tab) => tab.id !== tabId);
        openCategoryTabs = nextTabs;

        if (!openCategoryTabs.length) {
          activeCategoryTabId = null;
          renderCategoryTabsWorkspace();
          return;
        }

        if (activeCategoryTabId === tabId) {
          activeCategoryTabId = openCategoryTabs[openCategoryTabs.length - 1].id;
        }

        renderCategoryTabsWorkspace();
      }

      function renderCategoryTabsWorkspace() {
        if (!conversationTabsStrip || !conversationTabsPanels || !conversationTabsSection) return;

        const hasOpenTabs = openCategoryTabs.length > 0;
        conversationTabsSection.hidden = !hasOpenTabs;

        if (!hasOpenTabs) {
          conversationTabsStrip.innerHTML = "";
          conversationTabsPanels.innerHTML = "";
          return;
        }

        conversationTabsStrip.innerHTML = "";
        conversationTabsPanels.innerHTML = "";

        openCategoryTabs.forEach((tab) => {
          const tabRow = document.createElement("div");
          tabRow.className = "conversation-tab-item";

          const tabBtn = document.createElement("button");
          tabBtn.type = "button";
          tabBtn.className = "conversation-tab-btn" + (tab.id === activeCategoryTabId ? " is-active" : "");
          tabBtn.setAttribute("role", "tab");
          tabBtn.setAttribute("aria-selected", String(tab.id === activeCategoryTabId));
          tabBtn.textContent = tab.label;

          const closeBtn = document.createElement("button");
          closeBtn.type = "button";
          closeBtn.className = "conversation-tab-close";
          closeBtn.setAttribute("aria-label", "Cerrar pestaña");
          closeBtn.textContent = "✕";
          closeBtn.addEventListener("click", (event) => {
            event.stopPropagation();
            closeCategoryTab(tab.id);
          });

          tabBtn.addEventListener("click", () => {
            setActiveCategoryTab(tab.id);
          });

          tabRow.appendChild(tabBtn);
          tabRow.appendChild(closeBtn);
          conversationTabsStrip.appendChild(tabRow);

          const panel = document.createElement("section");
          panel.className = "conversation-tab-panel";
          panel.hidden = tab.id !== activeCategoryTabId;

          const list = document.createElement("div");
          list.className = "conversation-tab-list";
          const categoryConversations = getConversationsByCategory(tab.category);

          if (!categoryConversations.length) {
            const noData = document.createElement("p");
            noData.className = "conversation-tab-empty";
            noData.textContent = "No hay conversaciones guardadas en esta categoria todavia.";
            panel.appendChild(noData);
          } else {
            categoryConversations.forEach((conv) => {
              const item = document.createElement("button");
              item.type = "button";
              item.className = "history-item";
              item.dataset.conversationId = conv.id;

              const convCategory = resolveConversationCategory(conv);
              const iaTime = formatIaResponseTime(conv.lastIaResponseMs);
              const iaSuffix = iaTime ? ` · Tiempo resp. IA: ${iaTime}` : "";
              item.innerHTML = `
                <span class="history-item-title">${escapeHtml(truncate(conv.title, 54))}</span>
                <span class="history-item-meta"><strong class="history-item-category">${escapeHtml(getCategoryLabel(convCategory))}</strong> · ${escapeHtml(formatDate(conv.updatedAt))} · ${conv.messages.length} mensajes${escapeHtml(iaSuffix)}</span>
              `;

              item.addEventListener("click", () => {
                activeConversationId = conv.id;
                openModal();
                renderActiveConversation();
              });

              list.appendChild(item);
            });

            panel.appendChild(list);
          }

          conversationTabsPanels.appendChild(panel);
        });
      }

      function openNewCategoryTab(category) {
        const normalizedCategory = toCategoryValue(category);
        const label = getCategoryLabel(normalizedCategory);

        categoryTabSequence += 1;
        const tabId = `category_tab_${Date.now()}_${categoryTabSequence}`;

        openCategoryTabs.push({
          id: tabId,
          category: normalizedCategory,
          label: `${label} #${categoryTabSequence}`
        });

        activeCategoryTabId = tabId;
        renderCategoryTabsWorkspace();
      }

      function initCategoryTabsFromCards() {
        if (!statCards.length) return;

        statCards.forEach((card) => {
          const category = normalizeForSearch(card.dataset.category || card.querySelector("p")?.textContent || "");
          const triggerLink = card.querySelector("a");

          const openCategory = (event) => {
            event.preventDefault();
            openNewCategoryTab(category);
          };

          card.addEventListener("click", (event) => {
            if (event.target && event.target.closest("a")) return;
            openCategory(event);
          });

          if (triggerLink) {
            triggerLink.addEventListener("click", openCategory);
          }
        });
      }

      function renderExampleLists() {
        if (!exampleConversationsList || !exampleCasesList) return;

        const convSet = conversationExamples[examplesIndex % conversationExamples.length];
        const caseSet = caseExamples[examplesIndex % caseExamples.length];

        exampleConversationsList.innerHTML = convSet
          .map((item) => `<li>${escapeHtml(item)}</li>`)
          .join("");

        exampleCasesList.innerHTML = caseSet
          .map((item) => `<li>${escapeHtml(item)}</li>`)
          .join("");
      }

      function rotateExamples(step) {
        const max = Math.max(conversationExamples.length, caseExamples.length);
        examplesIndex = (examplesIndex + step + max) % max;
        renderExampleLists();
      }

      function startExamplesAutoplay() {
        if (examplesTimer) {
          clearInterval(examplesTimer);
        }

        examplesTimer = setInterval(() => {
          rotateExamples(1);
        }, 5000);
      }

      function initExamplesCarousel() {
        renderExampleLists();
        startExamplesAutoplay();

        if (examplesPrev) {
          examplesPrev.addEventListener("click", () => {
            rotateExamples(-1);
            startExamplesAutoplay();
          });
        }

        if (examplesNext) {
          examplesNext.addEventListener("click", () => {
            rotateExamples(1);
            startExamplesAutoplay();
          });
        }
      }

      function getActiveConversation() {
        return conversations.find((conv) => conv.id === activeConversationId) || null;
      }

      function createConversation() {
        const conversation = {
          id: `conv_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
          title: "Conversacion nueva",
          category: "consultas ia",
          caseStatus: "en proceso",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          lastIaResponseMs: null,
          messages: []
        };
        conversations.unshift(conversation);
        activeConversationId = conversation.id;
        saveConversations();
        renderSavedConversations();
        return conversation;
      }

      function ensureActiveConversation() {
        return getActiveConversation() || createConversation();
      }

      function appendMessageToConversation(role, text) {
        const active = ensureActiveConversation();
        if (!active) return;

        active.messages.push({
          role,
          text,
          createdAt: new Date().toISOString()
        });
        const messageIndex = active.messages.length - 1;
        updateConversationTitle(active, text);
        active.category = inferConversationCategory(active);
        active.caseStatus = inferConversationCaseStatus(active);
        active.updatedAt = new Date().toISOString();
        conversations.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
        saveConversations();
        renderSavedConversations();
        return messageIndex;
      }

      function updateConversationMessageAt(messageIndex, newText) {
        const active = getActiveConversation();
        if (!active || !Array.isArray(active.messages)) return false;
        if (messageIndex < 0 || messageIndex >= active.messages.length) return false;

        const target = active.messages[messageIndex];
        if (!target || target.role !== "user") return false;

        target.text = newText;
        target.editedAt = new Date().toISOString();
        updateConversationTitle(active, newText);
        active.category = inferConversationCategory(active);
        active.caseStatus = inferConversationCaseStatus(active);
        active.updatedAt = new Date().toISOString();

        conversations.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
        saveConversations();
        renderSavedConversations();
        return true;
      }

      function attachEditButtonIfNeeded(bubble, role, messageIndex) {
        if (role !== "user") return;
        if (typeof messageIndex !== "number") return;

        const actions = document.createElement("div");
        actions.className = "message-bubble-actions";

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.className = "message-edit-btn";
        editBtn.textContent = "Editar";
        editBtn.addEventListener("click", () => {
          const currentParagraph = bubble.querySelector("p");
          const currentText = currentParagraph ? currentParagraph.textContent || "" : "";
          const editedText = window.prompt("Edita tu mensaje:", currentText);
          if (editedText === null) return;

          const nextText = String(editedText).trim();
          if (!nextText || nextText === currentText.trim()) return;

          const updated = updateConversationMessageAt(messageIndex, nextText);
          if (!updated) return;

          if (currentParagraph) {
            currentParagraph.textContent = nextText;
          } else {
            bubble.insertAdjacentHTML("afterbegin", `<p>${escapeHtml(nextText)}</p>`);
          }
        });

        actions.appendChild(editBtn);
        bubble.appendChild(actions);
      }

      async function copyTextToClipboard(text) {
        const normalized = String(text || "");
        if (!normalized.trim()) return false;

        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          try {
            await navigator.clipboard.writeText(normalized);
            return true;
          } catch (_err) {
            // Fallback abajo.
          }
        }

        try {
          const temp = document.createElement("textarea");
          temp.value = normalized;
          temp.setAttribute("readonly", "");
          temp.style.position = "fixed";
          temp.style.opacity = "0";
          document.body.appendChild(temp);
          temp.select();
          const ok = document.execCommand("copy");
          document.body.removeChild(temp);
          return !!ok;
        } catch (_err) {
          return false;
        }
      }

      function attachCopyButtonIfNeeded(bubble, role) {
        if (role !== "bot") return;
        if (!bubble || bubble.classList.contains("transient") || bubble.classList.contains("thinking-bubble")) {
          return;
        }
        if (bubble.querySelector(".message-copy-btn")) return;

        const actions = document.createElement("div");
        actions.className = "message-bubble-actions";

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "message-copy-btn";
        copyBtn.textContent = "Copiar";
        copyBtn.addEventListener("click", async () => {
          const currentParagraph = bubble.querySelector("p");
          const currentText = currentParagraph ? currentParagraph.textContent || "" : "";
          const copied = await copyTextToClipboard(currentText);
          if (!copied) return;

          const previous = copyBtn.textContent;
          copyBtn.textContent = "Copiado";
          window.setTimeout(() => {
            copyBtn.textContent = previous;
          }, 1200);
        });

        actions.appendChild(copyBtn);
        bubble.appendChild(actions);
      }

      function getCasesForModalSearch(queryText) {
        const query = normalizeForSearch(queryText || "");

        const cases = conversations
          .filter((conv) => resolveConversationCategory(conv) === "casos")
          .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

        if (!query) return cases;

        return cases.filter((conv) => {
          const title = String(conv.title || "");
          const messages = Array.isArray(conv.messages)
            ? conv.messages.map((m) => String((m && m.text) || "")).join(" ")
            : "";
          const source = normalizeForSearch(`${title} ${messages}`);
          return source.includes(query);
        });
      }

      function renderCasesSearchModalList(queryText) {
        if (!casesSearchList) return;

        const filteredCases = getCasesForModalSearch(queryText);
        if (!filteredCases.length) {
          const hasCases = conversations.some((conv) => resolveConversationCategory(conv) === "casos");
          const emptyMessage = hasCases
            ? "No hay casos que coincidan con tu busqueda."
            : "Aun no hay casos guardados.";
          casesSearchList.innerHTML = `<p class="history-empty">${escapeHtml(emptyMessage)}</p>`;
          return;
        }

        casesSearchList.innerHTML = "";
        filteredCases.forEach((conv) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "cases-search-item";
          item.dataset.conversationId = conv.id;
          item.innerHTML = `
            <strong>${escapeHtml(truncate(conv.title, 62))}</strong>
            <span>${escapeHtml(formatDate(conv.updatedAt))} · ${conv.messages.length} mensajes</span>
          `;

          item.addEventListener("click", () => {
            activeConversationId = conv.id;
            closeCasesSearchModal();
            openModal();
            renderActiveConversation();
          });

          casesSearchList.appendChild(item);
        });

        const user = getCurrentUser();
        if (!user || typeof user !== "object") return false;
        if (!(user.email || user.id)) return false;
        if (user.isGuest === true) return false;

        const role = String(user.role || user.userType || user.profileType || "").toLowerCase();
        return role !== "guest" && role !== "invitado";
