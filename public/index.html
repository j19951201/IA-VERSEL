      function buildPromptFromConversation(active, latestUserText) {
        // Formato TinyLlama chat template para modelos Corvinus
        const normalizedUserText = normalizeBrainInput(latestUserText);
        const systemPrompt =
          "Eres IA Juris, una inteligencia artificial avanzada y de proposito general. " +
          "Puedes responder sobre cualquier tema: legal, ciencia, historia, tecnologia, cultura, matematicas, idiomas, y mas. " +
          "Responde SIEMPRE en espanol, de forma directa, clara y util. " +
          "El texto del usuario puede tener faltas de ortografia, letras cambiadas, palabras cortadas o escritura informal: interpreta la intencion real y no te aferres a la forma exacta del texto. " +
          "Si te piden la biografia, perfil o trayectoria de una figura publica, responde con informacion publica general sin rechazar por privacidad. " +
          "Prioriza una respuesta concreta y util antes que una negativa. Responde de forma natural, fluida y sin rigidez. " +
          "Si el usuario hace una repregunta sobre la misma persona, no repitas la misma respuesta: ampliala, resumela desde otro angulo o agrega datos nuevos relevantes. " +
          "Si el nombre o el referente no esta claro, usa el contexto previo de la conversacion para resolverlo antes de responder. " +
          "No conviertas la respuesta en un dialogo repetitivo ni en una lista interminable de preguntas y respuestas. " +
          "Da una sola respuesta compacta, coherente y sin reciclar la misma frase varias veces. " +
          "Si faltan datos exactos, explica lo que si sabes y completa con inferencias razonables o contexto relacionado. " +
          "Si el tema es general o de conocimiento amplio, responde con el mejor esfuerzo aunque no tengas todos los detalles. " +
          "Evita respuestas tipo 'no tengo informacion' salvo que sea absolutamente imposible responder. " +
          "Ajusta la longitud a la consulta: usa el nivel de detalle que pida la pregunta, sin relleno innecesario y sin convertir todo en listas. " +
          "Respeta el contexto de la conversacion y evita revelar datos internos, nombres de arquitectura, modelos, rutas, tokens, firmas tecnicas o detalles del sistema. " +
          "Cuando el usuario pregunte por identidad o procedencia, responde de forma breve y natural sin exponer informacion interna.";

        const messages = (active?.messages || []).slice(-6);
        let historyBlock = "";
        messages.forEach((m) => {
          if (m.role === "user") {
            historyBlock += `<|user|>\n${m.text}</s>\n`;
          } else {
            historyBlock += `<|assistant|>\n${m.text}</s>\n`;
          }
        });

        return (
          `<|system|>\n${systemPrompt}</s>\n` +
          historyBlock +
          `<|user|>\n${normalizedUserText}\n\nTexto original del usuario: ${latestUserText}</s>\n` +
          `<|assistant|>\n`
        );
      }

      function normalizeBrainInput(text) {
        const source = String(text || "").trim();
        if (!source) return source;

        let normalized = source;

        const replacements = [
          [/\bassciar\b/gi, "asociar"],
          [/\bcoerebncia\b/gi, "coherencia"],
          [/\brepsond\w*\b/gi, "responde"],
          [/\bistoria\b/gi, "historia"],
          [/\bsegimsundo\b/gi, "segismundo"],
          [/\bquien\b/gi, "quien"],
          [/\bcoerebnte\b/gi, "coherente"],
          [/\brepsuesta\b/gi, "respuesta"],
          [/\bcerwebro\b/gi, "cerebro"],
          [/\bcorvinus\s*unico\b/gi, "corvinus unico"]
        ];

        for (const [pattern, replacement] of replacements) {
          normalized = normalized.replace(pattern, replacement);
        }

        normalized = normalized
          .replace(/\bquien\b\s+fue\s+segismundo\b/gi, "quien fue segismundo")
          .replace(/\bquien\b\s+es\s+segismundo\b/gi, "quien es segismundo")
          .replace(/\bqiuen\b/gi, "quien")
          .replace(/\bsegsimundo\b/gi, "segismundo")
          .replace(/\bsegismudo\b/gi, "segismundo")
          .replace(/\bistoria\b/gi, "historia")
          .replace(/\bcoerebncia\b/gi, "coherencia")
          .replace(/\brepit\w*\b/gi, "repite")
          .replace(/\s+/g, " ");

        return normalized.trim();
      }

      function stripInternalSignature(text) {
        const normalized = String(text || "").trim();
        if (!normalized) return normalized;

        return normalized
          .replace(/\n{2,}© 2026 Corvinus Unico \| IA Juris\s*$/i, "")
          .replace(/\n?© 2026 Corvinus Unico \| IA Juris\s*$/i, "")
          .trim();
      }

      function isLikelyBiographyFollowUp(userText) {
        const text = String(userText || "").toLowerCase();
        return /\b(el|ella|él|esa persona|ese|esta persona|su biografia|su historia|su trayectoria)\b/.test(text);
      }

      async function askOllama(prompt, userText) {
        const startedAt = performance.now();
        const controllers = [];
        const assistantApiUrl = getAssistantApiUrl();

        if (isRemoteAssistantMode()) {
          try {
            const res = await fetch(assistantApiUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                prompt,
                input: userText,
                stream: false,
                options: OLLAMA_FAST_OPTIONS
              })
            });

            if (!res.ok) {
              throw new Error(`HTTP ${res.status}`);
            }

            const data = await res.json();
            const text = (data && data.response ? String(data.response) : "").trim();
            if (!text) {
              throw new Error("Respuesta vacia del modelo");
            }

            const responseMs = Math.max(1, Math.round(performance.now() - startedAt));
            return {
              ok: true,
              model: data.model || "api-remota",
              text,
              responseMs
            };
          } catch (err) {
            return { ok: false, error: err };
          }
        }

        const requests = OLLAMA_MODELS.map((model) => {
          const controller = new AbortController();
          controllers.push(controller);

          return fetch(assistantApiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: controller.signal,
            body: JSON.stringify({
              model,
              prompt,
              input: userText,
              stream: false,
              keep_alive: "20m",
              options: OLLAMA_FAST_OPTIONS
            })
          })
            .then(async (res) => {
              if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
              }
              const data = await res.json();
              const text = (data && data.response ? String(data.response) : "").trim();
              if (!text) {
                throw new Error("Respuesta vacia del modelo");
              }
              return { model, text };
            });
        });

        const timer = setTimeout(() => {
          controllers.forEach((c) => c.abort());
        }, OLLAMA_TIMEOUT_MS);

        try {
          const winner = await Promise.any(requests);
          controllers.forEach((c) => c.abort());
          const responseMs = Math.max(1, Math.round(performance.now() - startedAt));
          return { ok: true, model: winner.model, text: winner.text, responseMs };
        } catch (err) {
          return { ok: false, error: err };
        } finally {
          clearTimeout(timer);
        }
      }

      function buildPublicDemoResponse(userText) {
        const baseResponse = generateFallbackResponse(userText);
        return `${baseResponse} Esta respuesta se genero en modo demo publico, sin conexion al motor local de IA.`;
      }

      async function askAssistant(prompt, userText) {
        setPublicDemoMode(false);

        const result = await askOllama(prompt, userText);
        if (result.ok) {
          return result;
        }

        if (!isLocalPreviewHost()) {
          setPublicDemoMode(true);
          return {
            ok: true,
            model: PUBLIC_DEMO_MODEL,
            text: buildPublicDemoResponse(userText),
            responseMs: 1,
            isFallback: true
          };
        }

        return result;
      }

      function buildNoResponseMessage(error) {
        const detail = error && error.name === "AbortError"
          ? `tiempo agotado (${Math.round(OLLAMA_TIMEOUT_MS / 1000)}s)`
          : (error && error.message ? error.message : "sin detalle");

        return `El cerebro IA no respondió a tiempo (${detail}). Por favor intenta de nuevo.`;
      }

      function warmupOllama() {
        if (ollamaWarmupPromise) return ollamaWarmupPromise;

        if (isRemoteAssistantMode()) {
          ollamaWarmupPromise = Promise.resolve(null);
          return ollamaWarmupPromise;
        }

        ollamaWarmupPromise = fetch(getAssistantApiUrl(), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: OLLAMA_MODELS[0],
            prompt: "Responde solo: LISTO",
            stream: false,
            keep_alive: "20m",
            options: {
              temperature: 0,
              num_predict: 8,
              num_ctx: 128
            }
          })
        }).catch(() => {
          if (!isLocalPreviewHost()) {
            setPublicDemoMode(true);
          }
          return null;
        });

        return ollamaWarmupPromise;
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function generateFallbackResponse(userText) {
        const q = String(userText || "").toLowerCase();
        if (q.includes("despido")) {
          return "Maria te recomienda revisar precedentes recientes de despido injustificado y preparar cronologia de hechos con pruebas documentales.";
        }
        if (q.includes("contrato")) {
          return "Para contratos, primero valida clausulas de plazo, penalidades y causales de terminacion. Si quieres, te hago una lista de verificacion.";
        }
        if (q.includes("audiencia")) {
          return "Para audiencia, organiza hechos clave, evidencias y posibles preguntas de contraparte. Puedo ayudarte a preparar guion de intervencion.";
        }
        return "Recibi tu consulta. Puedo ayudarte con estrategia legal, analisis de documentos y busqueda de jurisprudencia relacionada.";
      }

      function normalizeTextForSpeech(text) {
        // Preservar acentos y caracteres especiales del español intactos
        return String(text || "")
          // Quitar markdown (solo símbolos que no sean texto)
          .replace(/[*_~`#>|]/g, " ")
          // Quitar URLs
          .replace(/https?:\/\/\S+/gi, "")
          // Expandir abreviaturas legales y comunes
          .replace(/\bArt\.\s*/gi, "Artículo ")
          .replace(/\bArts\.\s*/gi, "Artículos ")
          .replace(/\bDr\.\s*/gi, "Doctor ")
          .replace(/\bDra\.\s*/gi, "Doctora ")
          .replace(/\bSr\.\s*/gi, "Señor ")
          .replace(/\bSra\.\s*/gi, "Señora ")
          .replace(/\bSrta\.\s*/gi, "Señorita ")
          .replace(/\bLic\.\s*/gi, "Licenciado ")
          .replace(/\bvs\.\s*/gi, "versus ")
          .replace(/\betc\.\b/gi, "etcétera")
          .replace(/\bNum\.\s*/gi, "número ")
          .replace(/\bExp\.\s*/gi, "expediente ")
          // Paréntesis y corchetes → pausa natural
          .replace(/[()[\]{}<>]/g, ", ")
          // Puntuación múltiple
          .replace(/[!?]{2,}/g, "!")
          .replace(/\.{2,}/g, ". ")
          // Saltos de línea → pausa
          .replace(/\n+/g, ". ")
          // Dos puntos → pausa
          .replace(/:\s*/g, ", ")
          // Punto y coma → pausa
          .replace(/;/g, ",")
          // Guiones largos → pausa
          .replace(/[\u2013\u2014]/g, ", ")
          .replace(/\-{2,}/g, ", ")
          // Espacios antes de puntuación
          .replace(/\s+([,.!?])/g, "$1")
          // Comas repetidas
          .replace(/,+/g, ",")
          // Espacios múltiples
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      // Divide texto en grupos de pensamiento para ritmo de locutor de radio
      function splitIntoSentences(text) {
        // Dividir por pausas naturales para que la voz respire mejor
        const raw = text
          .replace(/([.!?])\s+/g, "$1\n")
          .replace(/([;:])\s+/g, "$1\n")
          .split("\n")
          .map((s) => s.trim())
          .filter((s) => s.length > 0);

        // Fusionar oraciones cortas con la siguiente para frases más naturales
        // Un locutor de radio habla en bloques fluidos sin cortes bruscos
        const merged = [];
        let acc = "";
        for (const chunk of raw) {
          acc = acc ? acc + " " + chunk : chunk;
          if (acc.length >= 160) {
            merged.push(acc);
            acc = "";
          }
        }
        if (acc) merged.push(acc);
        return merged.length ? merged : [text];
      }

      function getSpeechPauseMs(sentence) {
        const trimmed = String(sentence || "").trim();
        if (!trimmed) return 10;
        const commaCount = (trimmed.match(/,/g) || []).length;
        const semicolonCount = (trimmed.match(/;/g) || []).length;
        const colonCount = (trimmed.match(/:/g) || []).length;
        if (/[.!?]$/.test(trimmed)) {
          return 40;
        }
        if (/[:;]$/.test(trimmed)) {
          return 18;
        }
        if (/,$/.test(trimmed)) {
          return 10;
        }
        if (commaCount + semicolonCount + colonCount > 2) {
          return 12;
        }
        if (commaCount + semicolonCount + colonCount > 0) {
          return 10;
        }
        return trimmed.length > 120 ? 18 : 10;
      }

      function getAccentMarkCount(text) {
        const matches = String(text || "").match(/[áéíóúñÁÉÍÓÚÑ]/g);
        return matches ? matches.length : 0;
      }

      function findPreferredMariaVoice() {
        if (!hasSpeechSynthesis) return null;

        const voices = window.speechSynthesis.getVoices();
        if (!voices.length) return null;

        const spanishVoices = voices.filter((voice) => (voice.lang || "").toLowerCase().startsWith("es"));
        if (!spanishVoices.length) return voices[0] || null;

        // Forzar voz joven: Sabina, Dalia, Renata (en ese orden)
        const preferredNames = ["sabina", "dalia", "renata", "helena", "sofia", "laura", "lucia", "paulina", "monica"];
        for (const nameHint of preferredNames) {
          const v = spanishVoices.find((voice) => (voice.name || "").toLowerCase().includes(nameHint));
          if (v) return v;
        }
        // Si no, la primera voz femenina
        const femaleVoice = spanishVoices.find((voice) => (voice.name || "").toLowerCase().includes("female") || (voice.name || "").toLowerCase().includes("woman"));
        if (femaleVoice) return femaleVoice;
        // Si no, la primera voz española
        return spanishVoices[0];
      }

      function ensureMariaVoiceReady() {
        if (!hasSpeechSynthesis) {
          return Promise.resolve(null);
        }

        const immediateVoice = findPreferredMariaVoice();
        if (immediateVoice) {
          return Promise.resolve(immediateVoice);
        }

        if (mariaVoicePromise) {
          return mariaVoicePromise;
        }

        mariaVoicePromise = new Promise((resolve) => {
          let settled = false;
          const finish = () => {
            if (settled) return;
            settled = true;
            window.speechSynthesis.removeEventListener("voiceschanged", onVoicesChanged);
            resolve(findPreferredMariaVoice());
          };
          const onVoicesChanged = () => finish();

          window.speechSynthesis.addEventListener("voiceschanged", onVoicesChanged);
          window.setTimeout(finish, 1200);
        }).finally(() => {
          mariaVoicePromise = null;
        });

        return mariaVoicePromise;
      }

      async function ensureMicrophoneAccess() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          return { ok: true };
        }

        try {
          if (navigator.permissions && navigator.permissions.query) {
            const permissionStatus = await navigator.permissions.query({ name: "microphone" });
            if (permissionStatus.state === "denied") {
              return {
                ok: false,
                status: "Microfono bloqueado",
                transcript: "Permite el microfono para esta pagina en el navegador integrado o abre esta app en Chrome/Edge y habilitalo alli."
              };
            }
          }
        } catch (err) {
          // Algunos navegadores no soportan consultar este permiso.
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
              channelCount: 1
            }
          });
          stream.getTracks().forEach((track) => track.stop());
          return { ok: true };
        } catch (err) {
          const errorName = err && err.name ? err.name : "UnknownError";
          if (errorName === "NotAllowedError" || errorName === "SecurityError") {
            return {
              ok: false,
              status: "Microfono bloqueado",
              transcript: "El navegador nego el permiso del microfono. Pulsa 'Habilitar microfono' o abre la app en Chrome/Edge y concede acceso."
            };
          }
          if (errorName === "NotFoundError") {
            return {
              ok: false,
              status: "No se encontro un microfono",
              transcript: "Conecta o habilita un microfono en Windows para usar a Maria por voz."
            };
          }

          return {
            ok: false,
            status: "No se pudo abrir el microfono",
            transcript: "Revisa permisos y disponibilidad del microfono antes de iniciar el chat de voz."
          };
        }
      }

      // Habla un fragmento de texto como utterance único, devuelve Promise
      function _speakChunk(chunk, voice, rate, pitch, volume, lang) {
        return new Promise((resolve) => {
          const utter = new SpeechSynthesisUtterance(chunk);
          // Asegurar que la utterance use el idioma correcto para pronunciar acentos
          utter.lang   = (voice && voice.lang) ? voice.lang : (lang || "es-ES");
          utter.rate   = rate;
          utter.pitch  = pitch;
          utter.volume = volume;
          if (voice) utter.voice = voice;
          utter.onend   = () => resolve();
          utter.onerror = () => resolve();
          window.speechSynthesis.speak(utter);
        });
      }

      // Chrome bug fix: el sintetizador se pausa solo en textos largos.
      // Llamar speechSynthesis.resume() periódicamente lo mantiene activo.
      let _chromePauseFixTimer = null;
      function _startChromePauseFix() {
        _stopChromePauseFix();
        _chromePauseFixTimer = window.setInterval(() => {
          if (window.speechSynthesis.speaking && window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        }, 5000);
      }
      function _stopChromePauseFix() {
        if (_chromePauseFixTimer !== null) {
          window.clearInterval(_chromePauseFixTimer);
          _chromePauseFixTimer = null;
        }
      }

      async function speakAsMaria(text) {
        if (!hasSpeechSynthesis || !text) return;

        // Cancelar cualquier habla previa y dar tiempo al motor para limpiar el buffer
        window.speechSynthesis.cancel();
        await new Promise((r) => window.setTimeout(r, 150));

        const normalizedText = normalizeTextForSpeech(text);
        if (!normalizedText) return;

        const spanishVoice = await ensureMariaVoiceReady();
        // Forzar idioma es-ES para mejor pronunciación de acentos y vocales españolas
        const voiceLang = spanishVoice ? (spanishVoice.lang || "es-ES") : "es-ES";

        let rate   = MARIA_VOICE_TUNING.rate;
        let pitch  = MARIA_VOICE_TUNING.pitch;
        const vol  = MARIA_VOICE_TUNING.volume;

        // Ajuste fino por voz específica para máxima juventud y velocidad
        const voiceName = (spanishVoice && spanishVoice.name ? spanishVoice.name : "").toLowerCase();
        if (voiceName.includes("sabina")) {
          rate  = 0.93;
          pitch = 0.78;
        } else if (voiceName.includes("dalia") || voiceName.includes("renata")) {
          rate  = 0.92;
          pitch = 0.77;
        } else if (voiceName.includes("neural") || voiceName.includes("natural")) {
          rate  = 0.91;
          pitch = 0.76;
        } else {
          rate  = 0.90;
          pitch = 0.75;
        }

        const sentences = splitIntoSentences(normalizedText);

        _startChromePauseFix();
        for (const sentence of sentences) {
          if (!sentence.trim()) continue;
          const trimmedSentence = sentence.trim();
          const endingEmphasis = /[.!?]$/.test(trimmedSentence);
          const accentMarks = getAccentMarkCount(trimmedSentence);
          const accentSlowdown = Math.min(0.03, accentMarks * 0.004);
          const accentPauseBoost = Math.min(10, accentMarks * 1.5);
          const sentenceRate = endingEmphasis
            ? Math.max(0.88, rate - 0.005 - accentSlowdown)
            : Math.max(0.90, rate - accentSlowdown);
          const sentencePitch = endingEmphasis
            ? Math.max(0.72, pitch - 0.01)
            : pitch;
          await _speakChunk(sentence, spanishVoice, sentenceRate, sentencePitch, vol, voiceLang);
          // Pausa calculada por tipo de puntuación y densidad del texto
          await new Promise((r) => window.setTimeout(r, getSpeechPauseMs(sentence) + accentPauseBoost));
        }
        _stopChromePauseFix();
      }

      function setVoiceStatus(text) {
        if (voiceStatus) {
          voiceStatus.textContent = text;
        }
      }

      function setVoiceTranscript(text) {
        if (voiceTranscript) {
          voiceTranscript.textContent = text;

      }

      function showVoiceTextFallback() {
        if (!voiceTextFallback) return;
        voiceTextFallback.style.display = "block";

      async function submitVoiceFallbackText() {
        if (!voiceFallbackInput) return;
        const text = voiceFallbackInput.value.trim();
        if (!text) return;
        voiceFallbackInput.value = "";
        if (voiceFallbackSend) voiceFallbackSend.disabled = true;
        setVoiceStatus("Procesando tu consulta...");
        setVoiceTranscript(text);
        await respondAsMaria(text, true);
        if (voiceFallbackSend) voiceFallbackSend.disabled = false;

      function setSoundWaveActive(active) {
        if (!soundWave) return;
        soundWave.classList.toggle("active", !!active);
      }

      function typeAssistantTextDuringVoice(text, speak) {
        // En chat escrito, mostrar respuesta completa de inmediato para minimizar latencia percibida.
        if (!speak) {
          const bubble = document.createElement("div");
          bubble.className = "message-bubble bot";
          bubble.innerHTML = `<p>${escapeHtml(text)}</p>`;
          attachCopyButtonIfNeeded(bubble, "bot");
          chatMessages.appendChild(bubble);
          chatMessages.scrollTop = chatMessages.scrollHeight;
          appendMessageToConversation("bot", text);
          return Promise.resolve();
        }

        const bubble = document.createElement("div");
        bubble.className = "message-bubble bot";
        const p = document.createElement("p");
        bubble.appendChild(p);
        attachCopyButtonIfNeeded(bubble, "bot");
        chatMessages.appendChild(bubble);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        const typingPromise = new Promise((resolve) => {
          let idx = 0;
          const timer = setInterval(() => {
            idx += 1;
            p.textContent = text.slice(0, idx);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (idx >= text.length) {
              clearInterval(timer);
              resolve();
            }
          }, 10);
        });

        const speakPromise = speak ? speakAsMaria(text) : Promise.resolve();
        return Promise.all([typingPromise, speakPromise]).then(() => {
          appendMessageToConversation("bot", text);
        });
      }

      async function respondAsMaria(userText, useVoiceResponse) {
        const active = getActiveConversation();
        const prompt = buildPromptFromConversation(active, userText);
        const loadingBubble = addThinkingBubble();
        if (useVoiceResponse) {
          setVoiceStatus("Maria esta procesando...");
          setSoundWaveActive(true);
        }

        const result = await askAssistant(prompt, userText);
        if (loadingBubble) {
          loadingBubble.remove();
        }

        if (result.ok && !result.isFallback && active && Number.isFinite(result.responseMs)) {
          active.lastIaResponseMs = result.responseMs;
          active.updatedAt = new Date().toISOString();
          saveConversations();
          renderSavedConversations();
        }

        let finalText = stripInternalSignature(result.ok ? result.text : buildNoResponseMessage(result.error));
        if (result.ok && active && isLikelyBiographyFollowUp(userText) && active.messages && active.messages.length >= 2) {
          const previousAssistant = [...active.messages].reverse().find((message) => message.role === "bot" || message.role === "assistant");
          if (previousAssistant && finalText === String(previousAssistant.text || "").trim()) {
            finalText = `${finalText}\n\nSi quieres, te lo amplío con su infancia, logros, contexto histórico o impacto.`;
          }
        }
        if (useVoiceResponse) {
          setVoiceStatus("Maria esta respondiendo...");
          setVoiceTranscript(finalText);
        }
        await typeAssistantTextDuringVoice(finalText, useVoiceResponse);
        if (useVoiceResponse) {
          setSoundWaveActive(false);
          setVoiceStatus("Lista para escucharte");
        }
      }

      function updateVoiceButtonState(listening) {
        if (!voiceBtn) return;
        voiceBtn.classList.toggle("listening", listening);
        voiceBtn.textContent = listening ? "Escuchando" : "Maria";
      }

      async function startVoiceChat() {
        if (!recognition) {
          setVoiceStatus("Tu navegador no soporta reconocimiento de voz");
          setVoiceTranscript("Abre la app en un navegador compatible con reconocimiento de voz.");
          return;
        }
        if (isListening) return;

        if (startVoiceChatBtn) {
          startVoiceChatBtn.disabled = true;
        }

        setVoiceStatus("Solicitando permiso de microfono...");
        setVoiceTranscript("Si aparece el aviso del navegador, pulsa Permitir.");

        const micAccess = await ensureMicrophoneAccess();
        if (!micAccess.ok) {
          setSoundWaveActive(false);
          setVoiceStatus(micAccess.status);
          setVoiceTranscript(micAccess.transcript);
          showVoiceTextFallback();
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = false;
          }
          return;
        }

        cancelVoiceCycle = false;
        voiceNoSpeechRetries = 0;
        latestVoiceFinalText = "";
        latestVoiceInterimText = "";
        voiceCapturedSent = false;
        voiceMessageInFlight = false;
        setVoiceStatus("Escuchando...");
        setVoiceTranscript("Habla ahora. Maria esta escuchando tu consulta.");
        setSoundWaveActive(true);
        clearLiveVoiceBubble();

        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
          await new Promise((r) => window.setTimeout(r, 140));
        }

        try {
          try {
            recognition.abort();
          } catch (abortErr) {
            // Ignorar si no habia sesion activa.
          }
          recognition.start();
        } catch (err) {
          setVoiceStatus("No se pudo iniciar el microfono");
          setVoiceTranscript("Cierra otras apps que esten usando el microfono e intentalo otra vez.");
          setSoundWaveActive(false);
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = false;
          }
        }
      }

      function stopVoiceChat() {
        cancelVoiceCycle = true;

        if (recognition && isListening) {
          try {
            recognition.stop();
          } catch (err) {
            // stop puede fallar si no estaba escuchando.
          }
        }

        if (window.speechSynthesis && window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }

        isListening = false;
        updateVoiceButtonState(false);
        setSoundWaveActive(false);
        setVoiceStatus("Chat de voz detenido");
        setVoiceTranscript("Pulsa iniciar para hablar con Maria.");
        clearLiveVoiceBubble();
        if (startVoiceChatBtn) {
          startVoiceChatBtn.disabled = false;
        }
      }

      function initVoiceRecognition() {
        if (!hasVoiceRecognition) {
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = true;
            startVoiceChatBtn.title = "Tu navegador no soporta reconocimiento de voz";
          }
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "es-MX";
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          isListening = true;
          latestVoiceFinalText = "";
          latestVoiceInterimText = "";
          updateVoiceButtonState(true);
          setVoiceStatus("Escuchando...");
          setSoundWaveActive(true);
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = false;
          }
        };

        recognition.onresult = (event) => {
          let finalTranscript = "";
          let interimTranscript = "";

          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcript = event.results[i][0].transcript || "";
            if (event.results[i].isFinal) {
              finalTranscript += transcript;
            } else {
              interimTranscript += transcript;
            }
          }

          latestVoiceFinalText = `${latestVoiceFinalText} ${finalTranscript}`.trim();
          latestVoiceInterimText = interimTranscript.trim();
          if (latestVoiceFinalText) {
            voiceNoSpeechRetries = 0;
          }
          const live = `${latestVoiceFinalText} ${interimTranscript}`.trim();
          if (live) {
            chatInput.value = live;
            setVoiceTranscript(live);
            upsertLiveVoiceBubble(live);
          }
        };

        recognition.onerror = (event) => {
          isListening = false;
          updateVoiceButtonState(false);
          setSoundWaveActive(false);
          const errorCode = event && event.error ? event.error : "unknown";
          if (errorCode === "not-allowed" || errorCode === "service-not-allowed") {
            setVoiceStatus("Microfono bloqueado");
            setVoiceTranscript("El navegador no permitio usar el microfono. Escribe tu consulta abajo y Maria te responde.");
            showVoiceTextFallback();
          } else if (errorCode === "no-speech") {
            const partial = (latestVoiceFinalText || latestVoiceInterimText || chatInput.value || "").trim();
            if (partial && !voiceCapturedSent && !voiceMessageInFlight) {
              setVoiceStatus("Transcripcion parcial detectada. Procesando...");
              setVoiceTranscript(partial);
              submitCapturedVoiceText(partial);
              return;
            }
            if (voiceNoSpeechRetries < 1 && !cancelVoiceCycle) {
              voiceNoSpeechRetries += 1;
              setVoiceStatus("No se detecto voz. Reintentando...");
              setVoiceTranscript("Habla ahora. Maria sigue escuchando.");
              try {
                recognition.start();
                return;
              } catch (retryErr) {
                // Si falla el reintento, cae al mensaje normal.
              }
            }
            setVoiceStatus("No se detecto voz. Intenta otra vez.");
            setVoiceTranscript("Habla mas cerca del microfono y vuelve a pulsar iniciar.");
          } else if (errorCode === "audio-capture") {
            setVoiceStatus("No se pudo capturar audio");
            setVoiceTranscript("Verifica que tu microfono este conectado y disponible en Windows.");
          } else {
            setVoiceStatus("Error de reconocimiento de voz");
            setVoiceTranscript("No se pudo iniciar el chat de voz. Revisa el microfono e intentalo otra vez.");
          }
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = false;
          }
          clearLiveVoiceBubble();
        };

        recognition.onend = async () => {
          isListening = false;
          updateVoiceButtonState(false);
          if (startVoiceChatBtn) {
            startVoiceChatBtn.disabled = false;
          }

          if (voiceCapturedSent || voiceMessageInFlight) {
            setSoundWaveActive(false);
            return;
          }

          if (cancelVoiceCycle) {
            cancelVoiceCycle = false;
            setSoundWaveActive(false);
            clearLiveVoiceBubble();
            return;
          }

          const spokenText = (latestVoiceFinalText || latestVoiceInterimText || chatInput.value || "").trim();
          if (!spokenText) {
            if (voiceNoSpeechRetries < 1 && !cancelVoiceCycle) {
              voiceNoSpeechRetries += 1;
              setVoiceStatus("No se detecto voz. Reintentando...");
              setVoiceTranscript("Habla ahora. Maria sigue escuchando.");
              setSoundWaveActive(true);
              try {
                recognition.start();
                return;
              } catch (retryErr) {
                // Si falla el reintento, muestra mensaje final.
              }
            }
            setSoundWaveActive(false);
            setVoiceStatus("No se detecto voz. Intenta otra vez.");
            setVoiceTranscript("Habla con mas claridad o revisa tu microfono y vuelve a iniciar.");
            clearLiveVoiceBubble();
            return;
          }

          setVoiceStatus("Silencio detectado. Procesando...");
          await new Promise((resolve) => window.setTimeout(resolve, VOICE_SILENCE_MS));
          if (cancelVoiceCycle || voiceCapturedSent || voiceMessageInFlight) {
            setSoundWaveActive(false);
            return;
          }

          await submitCapturedVoiceText(spokenText);
        };
      }

      async function sendMessage(options = {}) {
        const text = (options.externalText || chatInput.value || "").trim();
        if (!text) return;

        ensureActiveConversation();
        addMessage(text, true);
        chatInput.value = "";
        await respondAsMaria(text, !!options.fromVoice);
      }

        casesSearchModal.addEventListener("click", (event) => {
          if (event.target === casesSearchModal) {
            closeCasesSearchModal();
          }
        });
      }

      if (assistantLaunchBtn) {
        assistantLaunchBtn.addEventListener("click", () => {
          openModal();
          openVoiceModal();
        });
      }
      closeBtn.addEventListener("click", closeModal);
      if (toggleChatFullscreenBtn) {
        toggleChatFullscreenBtn.addEventListener("click", toggleChatFullscreen);
      }
      sendBtn.addEventListener("click", () => {
        sendMessage();
      });
      chatInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          sendMessage();
        }
      });

      voiceBtn.addEventListener("click", async () => {
        openVoiceModal();
      });

      startVoiceChatBtn.addEventListener("click", () => {
        startVoiceChat();
      });

      if (voiceFallbackSend) {
        voiceFallbackSend.addEventListener("click", () => {
          submitVoiceFallbackText();
        });
      }

      if (voiceFallbackInput) {
        voiceFallbackInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            submitVoiceFallbackText();
          }
        });
      }

      stopVoiceChatBtn.addEventListener("click", () => {
        stopVoiceChat();
      });

      closeVoiceModalBtn.addEventListener("click", () => {
        closeModal();
      });

      if (profileAvatarBtn) {
        profileAvatarBtn.addEventListener("click", openProfilePrivateModal);
      }

      if (closeProfilePrivateModalBtn) {
        closeProfilePrivateModalBtn.addEventListener("click", closeProfilePrivateModal);
      }

      if (profilePrivateModal) {
        profilePrivateModal.addEventListener("click", (e) => {
          if (e.target === profilePrivateModal) {
            closeProfilePrivateModal();
          }
        });
      }

      if (closeStatusModalBtn) {
        closeStatusModalBtn.addEventListener("click", closeStatusModal);
      }

      if (statusModal) {
        statusModal.addEventListener("click", (e) => {
          if (e.target === statusModal) {
            closeStatusModal();
          }
        });
      }

      voiceModal.addEventListener("click", (e) => {
        if (e.target === voiceModal) {
          closeModal();
        }
      });

      if (modal) {
        modal.addEventListener("click", (e) => {
          if (e.target === modal) {
            closeModal();
          }
        });
      }

      document.querySelectorAll(".menu-group .menu-toggle").forEach((toggleBtn) => {
        const controlsId = toggleBtn.getAttribute("aria-controls") || "";
        const targetDropdown = controlsId
          ? document.getElementById(controlsId)
          : toggleBtn.parentElement?.querySelector(".menu-dropdown");

        if (!targetDropdown) return;

        toggleBtn.addEventListener("click", () => {
          const isOpen = toggleBtn.getAttribute("aria-expanded") === "true";
          if (!isOpen && sidebarConfig.oneOpenSection) {
            document.querySelectorAll(".menu-group .menu-toggle").forEach((otherBtn) => {
              if (otherBtn === toggleBtn) return;
              const otherControlsId = otherBtn.getAttribute("aria-controls") || "";
              const otherDropdown = otherControlsId
                ? document.getElementById(otherControlsId)
                : otherBtn.parentElement?.querySelector(".menu-dropdown");

              if (!otherDropdown) return;
              otherBtn.setAttribute("aria-expanded", "false");
              otherDropdown.hidden = true;
            });
          }
          const willOpen = !isOpen;
          toggleBtn.setAttribute("aria-expanded", String(willOpen));
          targetDropdown.hidden = !willOpen;

          if (willOpen) {
            runSidebarSectionBehavior(controlsId || targetDropdown.id || "");
          }
        });
      });

      function openUpgradeModalFromButtonClick(event) {
        const trigger = event.target && event.target.closest
          ? event.target.closest("#openUpgradeModalBtn")
          : null;
        if (!trigger) return;
        event.preventDefault();
        event.stopPropagation();
        openUpgradeModal();
      }

      if (openUpgradeModalBtn) {
        openUpgradeModalBtn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openUpgradeModal();
        });
      }

      document.addEventListener("click", openUpgradeModalFromButtonClick);

      if (closeUpgradeModalBtn) {
        closeUpgradeModalBtn.addEventListener("click", closeUpgradeModalFunc);
      }

      if (upgradeModal) {
        upgradeModal.addEventListener("click", (e) => {
          if (e.target === upgradeModal) {
            closeUpgradeModalFunc();
            return;
          }

          const planBtn = e.target && e.target.closest ? e.target.closest(".plan-btn") : null;
          if (planBtn) {
            handlePlanButtonClick(planBtn);
          }
        });
      }

      if (upgradeAuthLoginBtn) {
        upgradeAuthLoginBtn.addEventListener("click", () => {
          closeUpgradeModalFunc();
          openAuthModal("login");
        });
      }

      const STRIPE_PLAN_LABELS = {
        monthly: "Mensual",
        semiannual: "6 Meses",
        annual: "Anual"
      };

      const STRIPE_CHECKOUT_TIMEOUT_MS = 20000;

      function handlePlanButtonClick(btn) {
        if (!btn) return;

        if (!isUserLoggedInForUpgrade()) {
          renderUpgradeModalForAuthState();
          setFeedback("Inicia sesion para activar un plan premium.", "error");
          closeUpgradeModalFunc();
          openAuthModal("login");
          return;
        }

        const planId = String(btn.getAttribute("data-plan") || "").trim();
        if (!planId) {
          alert("No se pudo identificar el plan seleccionado.");
          return;
        }

        startStripeCheckout(planId, btn);
      }

      async function startStripeCheckout(planId, btn) {
        const label = STRIPE_PLAN_LABELS[planId] || "plan";
        if (!btn) return;

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Abriendo Stripe...";

        try {
          const currentUser = getCurrentUser() || {};
          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), STRIPE_CHECKOUT_TIMEOUT_MS);
          const response = await fetch("/api/checkout", {
            method: "POST",
            credentials: "include",
            signal: controller.signal,
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              planId,
              customer: {
                id: currentUser.id || "",
                email: currentUser.email || "",
                fullName: currentUser.fullName || currentUser.name || ""
              }
            })
          });
          window.clearTimeout(timeoutId);

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload && payload.error ? payload.error : `No se pudo abrir el checkout de ${label}`);
          }

          if (!payload || !payload.url) {
            throw new Error(payload.error || `No se pudo abrir el checkout de ${label}`);
          }

          window.location.href = payload.url;
        } catch (error) {
          const isTimeout = error && error.name === "AbortError";
          alert(
            isTimeout
              ? "El checkout esta tardando demasiado. Intenta de nuevo en unos segundos."
              : (error && error.message ? error.message : "No se pudo abrir Stripe Checkout.")
          );
        } finally {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      }

      document.querySelectorAll(".plan-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          handlePlanButtonClick(btn);
        });
      });

      initSidebarProgrammedSections();
      initVoiceRecognition();
      initCategoryTabsFromCards();
      initRecentCasesTabs();
      initExamplesCarousel();
      initCalendarWidget();
      normalizeLoadedConversationTitles();
      renderSavedConversations();
      renderIntroMessages();

      window.addEventListener("user:login", reloadConversationsForCurrentUser);
      window.addEventListener("user:logout", reloadConversationsForCurrentUser);
      window.addEventListener("user:login", renderUpgradeModalForAuthState);
      window.addEventListener("user:logout", renderUpgradeModalForAuthState);

      renderUpgradeModalForAuthState();
    })();
  </script>
