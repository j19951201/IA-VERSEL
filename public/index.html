<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16324f" />
  <title>IA Juris Dashboard</title>
  <meta name="description" content="IA Juris para gestion de casos y asistente legal inteligente." />
  <meta name="robots" content="index,follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <span class="hero-badge">IA Juris</span>
        <h1>Asistente legal inteligente</h1>
        <p>Consulta, redacta y organiza respuestas legales desde una interfaz simple y estable.</p>
      </div>
      <button id="openAssistantChatBtn" class="hero-open-btn" type="button">Abrir chat</button>
    </section>
  </main>

  <button id="openAssistantChatBtnFloating" class="chat-fab" type="button" aria-label="Abrir chat">💬</button>

  <div id="chatModal" class="chat-modal" aria-hidden="true">
    <div class="chat-modal-content" role="dialog" aria-modal="true" aria-labelledby="chatTitle">
      <div class="chat-modal-header">
        <div>
          <p class="chat-kicker">IA Juris</p>
          <h2 id="chatTitle">Chat legal</h2>
        </div>
        <button id="closeModal" class="chat-close-btn" type="button" aria-label="Cerrar">✕</button>
      </div>
      <div id="chatMessages" class="chat-messages">
        <div class="message-bubble bot">
          <p>Hola. Soy Maria, tu asistente legal. Escribe tu consulta para comenzar.</p>
        </div>
      </div>
      <div class="chat-input-row">
        <input id="chatInput" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
        <button id="voiceBtn" type="button" title="Hablar con Maria">🎤 Maria</button>
        <button id="sendBtn" class="chat-send-btn" type="button">Enviar</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
